<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Fish-Meter Pro v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #0f172a; font-family: 'Pretendard', sans-serif; overflow: hidden; -webkit-user-select: none; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.15); }
        .active-ring { animation: pulse-ring 1.5s infinite; border-color: #3b82f6 !important; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.8); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .flash { animation: flash-effect 0.2s ease-out; }
        @keyframes flash-effect { 0% { background: white; opacity: 1; } 100% { background: transparent; opacity: 0; } }
    </style>
</head>
<body class="text-white h-screen flex flex-col">
    <div id="flashOverlay" class="fixed inset-0 pointer-events-none z-50"></div>

    <header class="p-4 glass z-20 flex flex-col gap-3">
        <div class="flex justify-between items-center border-b border-white/20 pb-3">
            <div>
                <h1 class="text-blue-400 text-[10px] font-black uppercase">NIFS AI Fishery System</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="statusLed" class="w-3 h-3 rounded-full bg-red-600 animate-pulse"></span>
                    <span id="statusText" class="text-sm font-black text-slate-200">10cm 빨간 막대 인식 대기...</span>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <select id="speciesSelect" class="glass text-white font-black p-3.5 rounded-xl border border-white/10 outline-none">
                <option value="고등어">고등어</option>
                <option value="멸치">멸치</option>
                <option value="삼치">삼치</option>
                <option value="낙지">낙지</option>
            </select>
            <select id="modeSelect" class="glass text-blue-400 font-black p-3.5 rounded-xl border border-white/10 outline-none">
                <option value="TL">TL (전장)</option>
                <option value="FL">FL (가랑이)</option>
            </select>
        </div>
    </header>

    <main class="relative flex-1 bg-black overflow-hidden flex items-center justify-center">
        <video id="videoInput" class="absolute inset-0 w-full h-full object-cover" autoplay muted playsinline></video>
        <canvas id="canvasOutput" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>
        
        <div id="measurePopup" class="absolute top-12 left-1/2 -translate-x-1/2 hidden scale-125 z-20">
            <div class="glass px-10 py-6 rounded-[3rem] border-4 border-blue-500 shadow-2xl flex flex-col items-center">
                <div class="flex items-baseline gap-2">
                    <span id="lengthVal" class="text-6xl font-mono font-black">0.0</span>
                    <span class="text-2xl font-bold italic text-slate-400">mm</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-8 pb-12 bg-slate-900 rounded-t-[4rem] z-20 border-t-2 border-white/10 shadow-[0_-20px_50px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <button onclick="clearSession()" class="text-red-500 font-black text-xs uppercase tracking-tighter">Reset</button>
            <div class="flex flex-col items-center gap-3">
                <button id="mainBtn" onclick="saveRecord()" class="w-24 h-24 rounded-full border-[10px] border-slate-800 bg-slate-800 flex items-center justify-center transition-all disabled:opacity-30 active:scale-95 shadow-2xl" disabled>
                    <div class="w-10 h-10 bg-white rounded-xl shadow-inner"></div>
                </button>
                <span id="recordCount" class="text-xs font-mono text-slate-500 font-black">DATA SET: 0</span>
            </div>
            <button id="exportBtn" onclick="exportToCSV()" class="text-green-500 font-black text-xs uppercase opacity-30 tracking-tighter" disabled>Save CSV</button>
        </div>
    </footer>

    <script src="https://docs.opencv.org/4.5.4/opencv.js" async></script>
    <script>
        let video = document.getElementById('videoInput');
        let canvas = document.getElementById('canvasOutput');
        let videoCap = null, mmPerPx = null, records = [];

        var Module = { onRuntimeInitialized: () => { 
            window.isCvReady = true;
            initCamera();
        }};

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    videoCap = new cv.VideoCapture(video);
                    requestAnimationFrame(processLoop);
                };
            } catch (err) { alert("카메라 권한을 허용해주십시오."); }
        }

        function processLoop() {
            if (!window.isCvReady || video.readyState < 2) { requestAnimationFrame(processLoop); return; }

            try {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                videoCap.read(src);

                let hsv = new cv.Mat();
                cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                // [보정] 사진 속 선명한 빨간색 막대를 잡기 위한 HSV 설정
                let mask1 = new cv.Mat(), mask2 = new cv.Mat(), mask = new cv.Mat();
                let low1 = new cv.matFromArray(1, 3, cv.CV_8U, [0, 100, 100]);
                let high1 = new cv.matFromArray(1, 3, cv.CV_8U, [15, 255, 255]);
                let low2 = new cv.matFromArray(1, 3, cv.CV_8U, [165, 100, 100]);
                let high2 = new cv.matFromArray(1, 3, cv.CV_8U, [180, 255, 255]);
                
                cv.inRange(hsv, low1, high1, mask1);
                cv.inRange(hsv, low2, high2, mask2);
                cv.add(mask1, mask2, mask);

                // 면적 인식(Blob) 성능 향상을 위한 노이즈 제거
                let M = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(5, 5));
                cv.morphologyEx(mask, mask, cv.MORPH_OPEN, M);
                cv.morphologyEx(mask, mask, cv.MORPH_CLOSE, M);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(mask, contours, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                const mainBtn = document.getElementById('mainBtn');
                const statusLed = document.getElementById('statusLed');
                
                let foundRuler = false;
                let rulerPixelLen = 0;

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    
                    // 빨간색 막대의 면적 기준 (너무 작은 노이즈 무시)
                    if (area > 2000) { 
                        let rect = cv.minAreaRect(cnt);
                        let w = rect.size.width;
                        let h = rect.size.height;
                        let aspectRatio = Math.max(w, h) / Math.min(w, h);
                        
                        // 빨간색 막대는 가늘고 긴 직사각형 (비율 5:1 이상 탐지)
                        if (aspectRatio > 4.0) {
                            rulerPixelLen = Math.max(w, h);
                            foundRuler = true;
                            // 인식된 자 위에 초록색 테두리 표시
                            let vertices = cv.RotatedRect.points(rect);
                            for (let j = 0; j < 4; j++) cv.line(src, vertices[j], vertices[(j + 1) % 4], [34, 197, 94, 255], 10);
                            break; 
                        }
                    }
                }

                if (foundRuler) {
                    // [핵심] 사진 속 빨간 막대 전체 길이는 정확히 100mm(10cm)입니다.
                    mmPerPx = 100.0 / rulerPixelLen;
                    statusLed.classList.replace('bg-red-600', 'bg-green-500');
                    document.getElementById('statusText').innerText = "보정 완료 (10cm)";
                    mainBtn.disabled = false;
                    mainBtn.classList.replace('bg-slate-800', 'bg-blue-600');
                    mainBtn.classList.add('active-ring');
                } else {
                    mmPerPx = null;
                    statusLed.classList.replace('bg-green-500', 'bg-red-600');
                    document.getElementById('statusText').innerText = "빨간색 10cm 막대를 비춰주세요";
                    mainBtn.disabled = true;
                    mainBtn.classList.remove('active-ring');
                    mainBtn.classList.replace('bg-blue-600', 'bg-slate-800');
                    document.getElementById('measurePopup').classList.add('hidden');
                }

                // 물고기(대상체) 측정 로직
                if (mmPerPx) {
                    let gray = new cv.Mat();
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                    cv.GaussianBlur(gray, gray, new cv.Size(7, 7), 0);
                    cv.threshold(gray, gray, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);

                    let fContours = new cv.MatVector(), fHierarchy = new cv.Mat();
                    cv.findContours(gray, fContours, fHierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    let maxIdx = -1, maxArea = 0;
                    for (let i = 0; i < fContours.size(); i++) {
                        let area = cv.contourArea(fContours.get(i));
                        // 자 영역보다 큰 어두운 물체(물고기) 탐지
                        if (area > maxArea && area > 5000) { maxArea = area; maxIdx = i; }
                    }

                    if (maxIdx !== -1) {
                        let rect = cv.minAreaRect(fContours.get(maxIdx));
                        let rawLen = Math.max(rect.size.width, rect.size.height);
                        document.getElementById('measurePopup').classList.remove('hidden');
                        document.getElementById('lengthVal').innerText = (rawLen * mmPerPx).toFixed(1);
                        let vertices = cv.RotatedRect.points(rect);
                        for (let j = 0; j < 4; j++) cv.line(src, vertices[j], vertices[(j + 1) % 4], [59, 130, 246, 255], 6);
                    }
                    gray.delete(); fContours.delete(); fHierarchy.delete();
                }

                cv.imshow('canvasOutput', src);
                src.delete(); hsv.delete(); mask1.delete(); mask2.delete(); mask.delete(); 
                M.delete(); contours.delete(); hierarchy.delete();

            } catch (err) { }
            requestAnimationFrame(processLoop);
        }

        function saveRecord() {
            const length = document.getElementById('lengthVal').innerText;
            if (length === "0.0" || !mmPerPx) return;
            records.push({
                time: new Date().toLocaleTimeString(),
                species: document.getElementById('speciesSelect').value,
                length: length
            });
            document.getElementById('recordCount').innerText = `DATA SET: ${records.length}`;
            document.getElementById('exportBtn').disabled = false;
            document.getElementById('exportBtn').classList.remove('opacity-30');
            document.getElementById('flashOverlay').classList.add('flash');
            setTimeout(() => document.getElementById('flashOverlay').classList.remove('flash'), 200);
        }

        function exportToCSV() {
            let csv = "\uFEFF시간,어종,길이(mm)\n";
            records.forEach(r => csv += `${r.time},${r.species},${r.length}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Fishery_Report_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        function clearSession() { if(confirm("데이터를 초기화하시겠습니까?")) { records = []; document.getElementById('recordCount').innerText = "DATA SET: 0"; } }
    </script>
</body>
</html>
