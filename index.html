<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Fish-Meter Pro v1.0</title>
    
    <!-- PWA Manifest (Data URI 형태 유지) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlNtYXJ0IEZpc2gtTWV0ZXIgUHJvIHYxLjAiLAogICJzaG9ydF9uYW1lIjogIkZpc2hBSSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGYxNzJhIiwKICAidGhlbWVfY29sb3IiOiAiIzNiODJmNiIKfQ==">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #0f172a; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; -webkit-user-select: none; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.15); }
        .active-ring { animation: pulse-ring 1.5s infinite; border-color: #3b82f6 !important; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.8); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        select, input { color-scheme: dark; font-size: 1.1rem !important; font-weight: 800 !important; }
        .recording-flash { animation: flash 0.2s ease-out; }
        @keyframes flash { 0% { background: white; opacity: 1; } 100% { background: transparent; opacity: 0; } }
    </style>
</head>
<body class="text-white h-screen flex flex-col">
    <div id="flashOverlay" class="fixed inset-0 pointer-events-none z-50"></div>

    <!-- 상단 헤더 -->
    <header class="p-4 glass z-20 flex flex-col gap-3">
        <div class="flex justify-between items-center border-b border-white/20 pb-3">
            <div>
                <div class="flex items-center gap-2">
                    <h1 class="text-blue-400 text-[10px] font-black uppercase tracking-widest">NIFS South Sea Fishery Research</h1>
                    <!-- 오프라인 모드 상태 표시기 -->
                    <span id="networkStatus" class="text-[9px] px-1.5 py-0.5 rounded bg-slate-700 text-slate-300 font-bold">온라인</span>
                </div>
                <div id="calibrationStatus" class="flex items-center gap-2 mt-1">
                    <span id="statusLed" class="w-3 h-3 rounded-full bg-red-600 animate-pulse"></span>
                    <span id="statusText" class="text-sm font-black text-slate-200">AI 엔진 로딩 중...</span>
                </div>
            </div>
            <button onclick="toggleSetup()" class="p-3 bg-slate-800 rounded-xl border border-white/20 active:scale-90 transition-all">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1">
                <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">어종</label>
                <select id="speciesSelect" onchange="checkCustomSpecies()" class="glass text-white font-black p-3.5 rounded-xl appearance-none focus:outline-none border border-white/10">
                    <option value="개서대">개서대</option>
                    <option value="고등어" selected>고등어</option>
                    <option value="농어">농어</option>
                    <option value="멸치">멸치</option>
                    <option value="민어">민어</option>
                    <option value="삼치">삼치</option>
                    <option value="병어">병어</option>
                    <option value="덕대">덕대</option>
                    <option value="개조개">개조개</option>
                    <option value="낙지">낙지</option>
                    <option value="custom">직접 입력</option>
                </select>
                <input id="customSpeciesInput" type="text" placeholder="어종 직접 입력" class="hidden glass text-white font-black p-3 rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 border border-blue-500/50">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">기준</label>
                <select id="modeSelect" class="glass text-blue-400 font-black p-3.5 rounded-xl appearance-none focus:outline-none border border-white/10">
                    <option value="TL">TL (전장)</option>
                    <option value="FL">FL (가랑이)</option>
                    <option value="SL">SL (체장)</option>
                    <option value="ML">ML (어체장)</option>
                </select>
            </div>
        </div>
    </header>

    <!-- 중앙 카메라 분석부 -->
    <main class="relative flex-1 bg-black overflow-hidden flex items-center justify-center">
        <video id="videoInput" class="absolute inset-0 w-full h-full object-cover" autoplay muted playsinline></video>
        <canvas id="canvasOutput" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>
        
        <!-- 측정 결과 팝업 -->
        <div id="measurePopup" class="absolute top-12 left-1/2 -translate-x-1/2 hidden scale-110 sm:scale-125 transition-all z-20">
            <div class="glass px-10 py-6 rounded-[3rem] border-4 border-blue-500 shadow-2xl flex flex-col items-center">
                <span id="modeLabel" class="text-xs font-black text-blue-400 mb-1 tracking-[0.2em] uppercase text-center">TL Measurement</span>
                <div class="flex items-baseline gap-2">
                    <span id="lengthVal" class="text-6xl font-mono tracking-tighter text-white font-black">0.0</span>
                    <span class="text-2xl text-slate-400 font-black italic">mm</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 조사 정보 설정 모달 -->
    <div id="setupModal" class="fixed inset-0 z-40 flex items-center justify-center p-6 bg-black/90 hidden">
        <div class="glass w-full max-w-md rounded-[3rem] p-8 border-2 border-white/20 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-blue-400 italic text-center uppercase tracking-tighter">Survey Setup</h2>
            <div class="flex flex-col gap-4 mb-8">
                <input id="surveyDate" type="datetime-local" class="w-full glass p-4 rounded-xl font-black outline-none border border-white/10">
                <input id="surveyCoop" type="text" placeholder="조사수협 (예: 여수수협)" class="w-full glass p-4 rounded-xl font-black outline-none border border-white/10">
                <input id="surveyType" type="text" placeholder="어업종류 (예: 대형선망)" class="w-full glass p-4 rounded-xl font-black outline-none border border-white/10">
                <input id="surveyor" type="text" placeholder="조사원 성함" class="w-full glass p-4 rounded-xl font-black outline-none border border-white/10">
            </div>
            <button onclick="toggleSetup()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-xl active:scale-95 transition-all shadow-xl">저장 및 닫기</button>
        </div>
    </div>

    <!-- 하단 컨트롤 패널 -->
    <footer class="p-8 pb-12 bg-slate-900 rounded-t-[4rem] z-20 shadow-[0_-20px_60px_rgba(0,0,0,1)] border-t-2 border-white/10">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <button onclick="clearSession()" class="flex flex-col items-center gap-2 active:scale-90 transition-all p-3">
                <div class="w-14 h-14 glass rounded-2xl flex items-center justify-center text-red-500 border-2 border-red-500/20">
                    <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </div>
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Clear</span>
            </button>

            <div class="flex flex-col items-center gap-3">
                <button id="mainBtn" onclick="saveRecord()" class="w-24 h-24 rounded-full border-[10px] border-slate-800 bg-slate-800 shadow-2xl flex items-center justify-center active:scale-95 transition-all group disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    <div class="w-10 h-10 bg-white rounded-xl group-active:scale-75 transition-all shadow-inner"></div>
                </button>
                <span id="recordCount" class="text-xs font-mono text-slate-400 font-black tracking-tight">RECORDS: 0</span>
            </div>

            <button id="exportBtn" onclick="exportToCSV()" class="flex flex-col items-center gap-2 active:scale-90 transition-all p-3 opacity-30 pointer-events-none" disabled>
                <div class="w-14 h-14 glass rounded-2xl flex items-center justify-center text-green-400 border-2 border-green-500/20">
                    <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Export</span>
            </button>
        </div>
        <div class="mt-8 text-center flex flex-col gap-1">
            <p class="text-[9px] font-black text-slate-600 tracking-[0.4em] uppercase italic">Offline Vision AI Agent v1.0</p>
            <p class="text-[11px] font-black text-blue-500/70 uppercase tracking-tighter italic text-center">Developed by Moon Seong-yong</p>
        </div>
    </footer>

    <script>
        // 통신 상태 체크
        const updateNetworkStatus = () => {
            const statusEl = document.getElementById('networkStatus');
            if (navigator.onLine) {
                statusEl.innerText = "온라인";
                statusEl.className = "text-[9px] px-1.5 py-0.5 rounded bg-slate-700 text-slate-300 font-bold";
            } else {
                statusEl.innerText = "오프라인 모드 (현장 조사)";
                statusEl.className = "text-[9px] px-1.5 py-0.5 rounded bg-green-600 text-white font-bold animate-pulse";
            }
        };

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();

        // 브라우저 보안 정책 상 blob: URL 기반의 서비스 워커 등록이 제한되므로 
        // 에러를 유발하는 서비스 워커 강제 등록 로직을 제거했습니다.
        // 홈 화면 추가(웹 바로가기) 기능은 여전히 브라우저 캐시를 통해 지원됩니다.
        if ('serviceWorker' in navigator) {
            console.log('Single-file mode: Service Worker registration bypassed to prevent browser security errors.');
        }
    </script>

    <script src="https://docs.opencv.org/4.5.4/opencv.js" async></script>
    <script>
        let video = document.getElementById('videoInput');
        let canvas = document.getElementById('canvasOutput');
        let ctx = canvas.getContext('2d');
        let videoCap = null, mmPerPx = null, records = [], rafId = null;

        var Module = { onRuntimeInitialized: () => { 
            window.isCvReady = true;
            document.getElementById('statusText').innerText = "기준 자 (15cm) 대기 중";
            initCamera();
            initSurveyInfo();
        }};

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                };
            } catch (err) { 
                console.error("Camera access denied:", err);
                document.getElementById('statusText').innerText = "카메라 권한 오류";
            }
        }

        function initSurveyInfo() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('surveyDate').value = now.toISOString().slice(0, 16);
        }

        function checkCustomSpecies() {
            const select = document.getElementById('speciesSelect');
            const custom = document.getElementById('customSpeciesInput');
            custom.classList.toggle('hidden', select.value !== 'custom');
            if (select.value === 'custom') custom.focus();
        }

        function toggleSetup() { document.getElementById('setupModal').classList.toggle('hidden'); }

        function processLoop() {
            if (!window.isCvReady || video.readyState < 2 || video.videoWidth === 0) {
                rafId = requestAnimationFrame(processLoop);
                return;
            }

            try {
                if (!videoCap) {
                    videoCap = new cv.VideoCapture(video);
                }

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                videoCap.read(src);

                let hsv = new cv.Mat();
                cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                let mask1 = new cv.Mat(), mask2 = new cv.Mat(), mask = new cv.Mat();
                let low1 = new cv.matFromArray(1, 3, cv.CV_8U, [0, 130, 50]);
                let high1 = new cv.matFromArray(1, 3, cv.CV_8U, [10, 255, 255]);
                let low2 = new cv.matFromArray(1, 3, cv.CV_8U, [170, 130, 50]);
                let high2 = new cv.matFromArray(1, 3, cv.CV_8U, [180, 255, 255]);
                
                cv.inRange(hsv, low1, high1, mask1);
                cv.inRange(hsv, low2, high2, mask2);
                cv.add(mask1, mask2, mask);

                let lines = new cv.Mat();
                cv.HoughLinesP(mask, lines, 1, Math.PI / 180, 40, 60, 20);

                const mainBtn = document.getElementById('mainBtn');
                const statusLed = document.getElementById('statusLed');

                if (lines.rows > 0) {
                    let maxPx = 0;
                    for (let i = 0; i < lines.rows; ++i) {
                        let x1 = lines.data32S[i * 4], y1 = lines.data32S[i * 4 + 1];
                        let x2 = lines.data32S[i * 4 + 2], y2 = lines.data32S[i * 4 + 3];
                        let d = Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2));
                        if (d > maxPx) {
                            maxPx = d;
                            cv.line(src, new cv.Point(x1, y1), new cv.Point(x2, y2), [34, 197, 94, 255], 10);
                        }
                    }
                    mmPerPx = 150.0 / maxPx;
                    statusLed.classList.replace('bg-red-600', 'bg-green-500');
                    document.getElementById('statusText').innerText = "보정 완료 (150mm)";
                    mainBtn.disabled = false;
                    mainBtn.classList.replace('bg-slate-800', 'bg-blue-600');
                    mainBtn.classList.add('active-ring');
                } else {
                    mmPerPx = null;
                    statusLed.classList.replace('bg-green-500', 'bg-red-600');
                    document.getElementById('statusText').innerText = "기준 자 인식 대기 중";
                    mainBtn.disabled = true;
                    mainBtn.classList.remove('active-ring');
                    mainBtn.classList.replace('bg-blue-600', 'bg-slate-800');
                    document.getElementById('measurePopup').classList.add('hidden');
                }

                if (mmPerPx) {
                    let gray = new cv.Mat();
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                    cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
                    cv.threshold(gray, gray, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);

                    let contours = new cv.MatVector(), hierarchy = new cv.Mat();
                    cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    let maxIdx = -1, maxArea = 0;
                    for (let i = 0; i < contours.size(); i++) {
                        let area = cv.contourArea(contours.get(i));
                        if (area > maxArea && area > 5000) { maxArea = area; maxIdx = i; }
                    }

                    if (maxIdx !== -1) {
                        let cnt = contours.get(maxIdx);
                        let rect = cv.minAreaRect(cnt);
                        let vertices = cv.RotatedRect.points(rect);
                        const mode = document.getElementById('modeSelect').value;
                        let rawLen = Math.max(rect.size.width, rect.size.height);
                        
                        if (mode === "FL") rawLen *= 0.934;
                        else if (mode === "SL") rawLen *= 0.865;

                        document.getElementById('measurePopup').classList.remove('hidden');
                        document.getElementById('lengthVal').innerText = (rawLen * mmPerPx).toFixed(1);
                        document.getElementById('modeLabel').innerText = `${mode} MEASUREMENT`;
                        for (let j = 0; j < 4; j++) cv.line(src, vertices[j], vertices[(j + 1) % 4], [59, 130, 246, 255], 8);
                    }
                    gray.delete(); contours.delete(); hierarchy.delete();
                }

                cv.imshow('canvasOutput', src);

                src.delete(); hsv.delete(); mask1.delete(); mask2.delete(); mask.delete(); 
                low1.delete(); high1.delete(); low2.delete(); high2.delete(); lines.delete();

            } catch (err) {
                console.warn("Frame capture skipped due to size mismatch.");
            }
            rafId = requestAnimationFrame(processLoop);
        }

        function saveRecord() {
            const length = document.getElementById('lengthVal').innerText;
            if (length === "0.0" || !mmPerPx) return;
            const species = document.getElementById('speciesSelect').value === 'custom' ? document.getElementById('customSpeciesInput').value : document.getElementById('speciesSelect').value;
            records.push({
                date: document.getElementById('surveyDate').value.replace('T', ' '),
                coop: document.getElementById('surveyCoop').value || "미기입",
                type: document.getElementById('surveyType').value || "미기입",
                surveyor: document.getElementById('surveyor').value || "미기입",
                species: species || "미식별",
                mode: document.getElementById('modeSelect').value,
                length: length
            });
            document.getElementById('recordCount').innerText = `RECORDS: ${records.length}`;
            document.getElementById('recordCount').classList.replace('text-slate-400', 'text-blue-400');
            document.getElementById('exportBtn').disabled = false;
            document.getElementById('exportBtn').classList.remove('opacity-30', 'pointer-events-none');
            document.getElementById('flashOverlay').classList.add('recording-flash');
            setTimeout(() => document.getElementById('flashOverlay').classList.remove('recording-flash'), 200);
        }

        function exportToCSV() {
            if (!records.length) return;
            let csv = "\uFEFF순번,조사일시,조사수협,어업종류,조사원,어종,기준,길이(mm)\n";
            records.forEach((r, i) => csv += `${i+1},${r.date},${r.coop},${r.type},${r.surveyor},${r.species},${r.mode},${r.length}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `FishData_Offline_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        function clearSession() {
            if (confirm("모든 데이터를 초기화하시겠습니까?")) {
                records = [];
                document.getElementById('recordCount').innerText = `RECORDS: 0`;
                document.getElementById('recordCount').classList.replace('text-blue-400', 'text-slate-400');
                document.getElementById('exportBtn').disabled = true;
                document.getElementById('exportBtn').classList.add('opacity-30', 'pointer-events-none');
            }
        }
    </script>
</body>
